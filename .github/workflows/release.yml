name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, i.e. v1.0.0

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux AMD64 (x86_64)
          - os: ubuntu-latest
            artifact_name: gitdupan
            asset_name: gitdupan-linux-amd64.tar.gz
            python_target: '3.12'
          # Linux ARM64 (aarch64)
          - os: ubuntu-24.04-arm
            artifact_name: gitdupan
            asset_name: gitdupan-linux-arm64.tar.gz
            python_target: '3.12'
          # Windows AMD64 (64-bit)
          - os: windows-latest
            artifact_name: gitdupan.exe
            asset_name: gitdupan-windows-amd64.zip
            python_target: '3.12'
          # Windows x86 (32-bit)
          - os: windows-latest
            artifact_name: gitdupan.exe
            asset_name: gitdupan-windows-386.zip
            python_target: '3.12-x86'
          # macOS Apple Silicon (ARM64)
          - os: macos-14
            artifact_name: gitdupan
            asset_name: gitdupan-macos-arm64.tar.gz
            python_target: '3.12'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Set up Python
        run: |
          uv python install ${{ matrix.python_target }}
          uv python pin ${{ matrix.python_target }}

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Build Executable with PyInstaller
        run: uv run pyinstaller --name gitdupan --onefile --console src/gitdupan/cli.py

      - name: Create Alias Copies (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          cp gitdupan gitdp
          cp gitdupan gid

      - name: Create Alias Copies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          Copy-Item -Path gitdupan.exe -Destination gitdp.exe
          Copy-Item -Path gitdupan.exe -Destination gid.exe

      - name: Compress Artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          tar -czvf ../${{ matrix.asset_name }} gitdupan gitdp gid

      - name: Compress Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          Compress-Archive -Path gitdupan.exe, gitdp.exe, gid.exe -DestinationPath ../${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Prepare assets for release
        run: |
          mkdir -p release_assets
          # Move all compressed artifacts directly to the release directory
          cp artifacts/*/* release_assets/ || true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
